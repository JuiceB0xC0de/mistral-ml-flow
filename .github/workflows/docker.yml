name: Build & Push Mistral ML Image

# Builds the CUDA 13 Mistral/Ministral atlas image and pushes it to Docker Hub.
# Image: juiceboxdocks/ml-workflow-image (public). Requires repo secrets
# DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA 13 devel image is large; reclaim runner disk before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Image is CUDA 13.0 -> tag cu130 (not cu128). 'latest' tracks the
          # newest build. The legacy cu128 tag still exists on Docker Hub for
          # back-compat but is no longer pushed here.
          tags: |
            juiceboxdocks/ml-workflow-image:latest
            juiceboxdocks/ml-workflow-image:cu130
          # No gha cache: mode=max ~doubles peak disk by materializing every
          # layer for export, which OOM'd the runner on this ~20GB CUDA image.
          provenance: false
