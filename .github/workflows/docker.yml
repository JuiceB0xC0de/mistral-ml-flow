name: Build & Push Atlas ML Image

# Builds the CUDA 13 atlas image (Mistral3 + Qwen3.5) and pushes it to Docker Hub.
# Anchor: Python 3.13, torch 2.12.1 cu130, flash-attn 2.8.3, transformers 5.2.0.
# Image: juiceboxdocks/ml-workflow-image (public). Requires repo secrets
# DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA 13 devel image is large; reclaim runner disk before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Image is CUDA 13.0 -> tag cu130. py313-torch212 pins the exact
          # Python/torch anchor. 'latest' tracks the newest build.
          tags: |
            juiceboxdocks/ml-workflow-image:latest
            juiceboxdocks/ml-workflow-image:cu130
            juiceboxdocks/ml-workflow-image:py313-torch212
          # No gha cache: mode=max ~doubles peak disk by materializing every
          # layer for export, which OOM'd the runner on this ~20GB CUDA image.
          provenance: false
