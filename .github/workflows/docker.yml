name: Build & Push Mistral ML Image

# Builds the CUDA 13 Mistral/Ministral atlas image and pushes it to Docker Hub.
# Canonical image: juiceboxdocks/mistral-ml-flow (matches this repo + the RunPod
# template). Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA 13 devel image is ~20GB; reclaim runner disk before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            juiceboxdocks/mistral-ml-flow:latest
            juiceboxdocks/mistral-ml-flow:cu130
            juiceboxdocks/mistral-ml-flow:cu128
          # cu128 is a legacy alias kept so existing pods/templates that still
          # reference :cu128 keep resolving. The image is actually CUDA 13.0
          # (cu130); migrate references to :cu130 or :latest when convenient.
          #
          # No gha cache: mode=max ~doubles peak disk by materializing every
          # layer for export, which OOM'd the runner on this ~20GB CUDA image.
          provenance: false
